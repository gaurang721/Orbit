# =============================================================================
# fbclone — full local/production stack
# Run from the repo root:  docker compose -f docker/docker-compose.yml up -d
# Env is read from the repo-root .env file.
# =============================================================================
name: fbclone

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fbclone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fbclone_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-fbclone}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fbclone}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # S3-compatible object storage for media (images/videos)
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      WEB_URL: ${WEB_URL:-http://localhost}
      API_URL: ${API_URL:-http://localhost/api}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      DATABASE_URL: postgresql://${POSTGRES_USER:-fbclone}:${POSTGRES_PASSWORD:-fbclone_dev_password}@postgres:5432/${POSTGRES_DB:-fbclone}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      # Local stack runs over plain HTTP behind nginx; flip to true (with TLS) in prod.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-fbclone <no-reply@fbclone.local>}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-fbclone-media}
    expose:
      - '4000'

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        # Browser-reachable origin (nginx). The API client appends /api/v1 and
        # nginx proxies /api + /socket.io to the api service.
        NEXT_PUBLIC_API_URL: ${WEB_URL:-http://localhost}
        NEXT_PUBLIC_SOCKET_URL: ${WEB_URL:-http://localhost}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
    expose:
      - '3000'

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
