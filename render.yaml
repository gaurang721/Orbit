# =============================================================================
# Render Blueprint — deploys the Orbit API + a FREE Postgres database.
# The website is deployed separately on Vercel (free). See DEPLOY-FREE.md.
#
# Use it: Render dashboard → New + → Blueprint → pick your GitHub repo.
# Render reads this file, creates the database, generates the secrets, and
# builds the API from docker/api.Dockerfile. You only fill in 3 URLs afterward.
# =============================================================================

databases:
  - name: orbit-db
    plan: free # free Postgres (expires after 90 days — recreate or upgrade later)
    databaseName: orbit
    user: orbit

services:
  - type: web
    name: orbit-api
    runtime: docker
    plan: free # free web service (sleeps after ~15 min idle; wakes on next visit)
    dockerfilePath: docker/api.Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "4000"
      # Auto-wired from the database above — do not edit.
      - key: DATABASE_URL
        fromDatabase:
          name: orbit-db
          property: connectionString
      # Single instance → in-memory rate limiting (no Redis needed).
      - key: REDIS_ENABLED
        value: "false"
      # Strong secrets, generated by Render automatically.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      # Blank = host-only cookie, so login works behind the web's /api proxy.
      - key: COOKIE_DOMAIN
        value: ""
      - key: LOG_LEVEL
        value: info
      # ↓↓↓ Fill these in AFTER your Vercel website is live (DEPLOY-FREE.md) ↓↓↓
      - key: WEB_URL
        sync: false
      - key: API_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Media uploads: blank = local disk (resets on redeploy). Set S3_* for
      # permanent storage (e.g. Cloudflare R2 free tier).
      - key: S3_BUCKET
        value: ""
      # Email: blank = emails are written to the server logs instead of sent.
      # Set SMTP_HOST/PORT/USER/PASSWORD to deliver real verification emails.
      - key: SMTP_HOST
        value: ""
