# =============================================================================
# Render Blueprint — deploys the Orbit API (free web service).
# Database: use a FREE Neon Postgres (neon.tech) — permanent, no card, reliable.
# Create a Neon project, copy its connection string, and paste it as the
# DATABASE_URL env var on this service (Render dashboard). See DEPLOY-FREE.md.
#
# The website is deployed separately on Vercel (free).
# =============================================================================

services:
  - type: web
    name: orbit-api
    runtime: docker
    plan: free # free web service (sleeps after ~15 min idle; wakes on next visit)
    dockerfilePath: docker/api.Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "4000"
      # Paste your Neon connection string here in the Render dashboard.
      # Use the DIRECT (non-pooled) string and make sure it ends with ?sslmode=require
      - key: DATABASE_URL
        sync: false
      # Single instance → in-memory rate limiting (no Redis needed).
      - key: REDIS_ENABLED
        value: "false"
      # Strong secrets, generated by Render automatically.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      # Blank = host-only cookie, so login works behind the web's /api proxy.
      - key: COOKIE_DOMAIN
        value: ""
      - key: LOG_LEVEL
        value: info
      # ↓↓↓ Fill these in AFTER your Vercel website is live (DEPLOY-FREE.md) ↓↓↓
      - key: WEB_URL
        sync: false
      - key: API_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Media uploads: blank = local disk (resets on redeploy). Set S3_* for
      # permanent storage (e.g. Cloudflare R2 free tier).
      - key: S3_BUCKET
        value: ""
      # Email: blank = emails are written to the server logs instead of sent.
      - key: SMTP_HOST
        value: ""
