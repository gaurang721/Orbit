name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy values so env validation passes during build/typecheck steps.
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fbclone_test?schema=public
  REDIS_URL: redis://localhost:6379
  JWT_ACCESS_SECRET: ci_access_secret_value_long_enough
  JWT_REFRESH_SECRET: ci_refresh_secret_value_long_enough
  COOKIE_SECRET: ci_cookie_secret
  NEXT_PUBLIC_API_URL: http://localhost:4000

jobs:
  build-test:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fbclone_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run prisma:deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: false
          tags: fbclone-api:ci
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: false
          tags: fbclone-web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost
            NEXT_PUBLIC_SOCKET_URL=http://localhost
